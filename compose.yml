services:
  notenschluessel:
    image: ghcr.io/payback159/notenschluessel:latest
    ports:
      - "8080:8080"
    restart: unless-stopped

    environment:
      - ENV=production
      - STATIC_DIR=/app/dist

    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

    healthcheck:
      test: ["CMD", "/app/notenschluessel", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
