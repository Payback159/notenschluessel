<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
    <title>Notenschluessel (Client-only)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .grid {
            display: grid;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f2f2f2;
        }

        .hidden {
            display: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .error {
            background: #fed7d7;
            color: #742a2a;
        }

        .success {
            background: #c6f6d5;
            color: #22543d;
        }

        button {
            cursor: pointer;
            padding: 8px 12px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
        }
    </style>
</head>

<body>
    <h1>Notenschluessel (Client-only)</h1>

    <div class="card">
        <div id="message" class="message hidden"></div>

        <form id="calcForm" class="grid">
            <label>
                Maximale Punktzahl
                <input id="maxPoints" type="number" value="100" min="1" max="1000" required />
            </label>

            <label>
                Punkteschrittweite
                <input id="minPoints" type="number" value="0.5" min="0.1" step="0.1" required />
            </label>

            <label>
                Knickpunkt in %
                <input id="breakPointPercent" type="number" value="50" min="1" max="99" required />
            </label>

            <fieldset>
                <legend>Eingabemodus</legend>
                <label><input type="radio" name="inputMode" value="csv" checked /> CSV</label>
                <label><input type="radio" name="inputMode" value="manual" /> Manuell</label>
            </fieldset>

            <div id="csvSection">
                <label>
                    CSV-Datei (optional)
                    <input id="csvFile" type="file" accept=".csv" />
                </label>
            </div>

            <div id="manualSection" class="hidden">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Punkte</th>
                            <th>Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="manualRows"></tbody>
                </table>
                <button id="addRowBtn" type="button">Zeile hinzufuegen</button>
            </div>

            <div class="actions">
                <button type="submit">Berechnen</button>
                <button id="deleteDataBtn" type="button">Lokale Daten loeschen</button>
                <a href="/privacy.html">Datenschutz</a>
            </div>
        </form>
    </div>

    <div id="gradeScaleCard" class="card hidden">
        <h2>Notenschluessel</h2>
        <table>
            <thead>
                <tr>
                    <th>Note</th>
                    <th>Punktebereich</th>
                </tr>
            </thead>
            <tbody id="gradeScaleBody"></tbody>
        </table>
        <div class="actions">
            <button id="downloadScaleCsvBtn" type="button">Notenskala CSV</button>
            <button id="downloadScaleXlsxBtn" type="button">Notenskala Excel</button>
        </div>
    </div>

    <div id="studentsCard" class="card hidden">
        <h2>Schuelerergebnisse</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Punkte</th>
                    <th>Note</th>
                </tr>
            </thead>
            <tbody id="studentsBody"></tbody>
        </table>
        <h3 id="averageGrade"></h3>
        <div class="actions">
            <button id="downloadStudentsCsvBtn" type="button">Schueler CSV</button>
            <button id="downloadStudentsXlsxBtn" type="button">Schueler Excel</button>
            <button id="downloadCombinedCsvBtn" type="button">Kombiniert CSV</button>
            <button id="downloadCombinedXlsxBtn" type="button">Kombiniert Excel</button>
        </div>
    </div>

    <script type="module" src="/src/app.ts"></script>
</body>

</html>
