# HSTS only over HTTPS. TLS is terminated by an upstream proxy, so we trust
# X-Forwarded-Proto. nginx omits the header entirely when the value is empty.
map $http_x_forwarded_proto $hsts_header {
    default "";
    https   "max-age=31536000; includeSubDomains";
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security $hsts_header always;

    # Cache static assets aggressively (Vite adds content hash to filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Repeat security headers (nginx doesn't inherit add_header in nested locations)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Healthcheck
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
