<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datenschutz - Notenschlüssel</title>
    <style>
        :root {
            --bg: #f3f5ef;
            --bg-2: #e7ede0;
            --card: #ffffff;
            --text: #22251f;
            --muted: #5a6154;
            --line: #d1d9c8;
            --accent: #0b6e4f;
            --shadow: 0 12px 30px rgba(31, 46, 27, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
            color: var(--text);
            background:
                radial-gradient(60rem 28rem at -10% -20%, rgba(11, 110, 79, 0.2), transparent 60%),
                radial-gradient(54rem 24rem at 110% 0%, rgba(244, 162, 89, 0.24), transparent 55%),
                linear-gradient(160deg, var(--bg), var(--bg-2));
            min-height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 22px 14px 40px;
            line-height: 1.6;
        }

        h1 {
            margin: 0 0 10px;
            line-height: 1.2;
            letter-spacing: 0.01em;
        }

        p {
            color: var(--muted);
            margin: 0 0 12px;
        }

        .card {
            background: color-mix(in srgb, var(--card) 88%, #f4f7ee 12%);
            border-radius: 16px;
            border: 1px solid var(--line);
            padding: 18px;
            box-shadow: var(--shadow);
        }

        a {
            display: inline-block;
            margin-top: 10px;
            background: var(--accent);
            color: white;
            padding: 8px 14px;
            border-radius: 999px;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        a:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(11, 110, 79, 0.22);
        }

        a:focus-visible {
            outline: 2px solid #0f7f5b;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <h1>Datenschutz</h1>
    <div class="card">
        <p>Diese Version verarbeitet Schülerdaten ausschließlich im Browser.</p>
        <p>Es werden keine Schülerdaten an den Server übertragen oder dort gespeichert.</p>
        <p>Du kannst lokale Daten jederzeit mit "Lokale Daten löschen" entfernen.</p>
        <a href="/">Zurück zur App</a>
    </div>
</body>

</html>
